<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rave - Solo & GL6C</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #0b0d19; 
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .rave-container {
            width: 100%;
            max-width: 450px;
            background-color: #131722;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 25px rgba(0, 229, 255, 0.15);
            border: 1px solid #1f2638;
            position: relative;
        }

        .rave-player {
            width: 100%;
            position: relative;
            background-color: #000000;
            aspect-ratio: 16 / 11;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rave-player img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .live-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: #ff0055;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            animation: pulse 1.5s infinite;
            z-index: 10;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .login-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: rgba(19, 23, 34, 0.8);
            border: 1px solid #00e5ff;
            color: #00e5ff;
            padding: 5px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            z-index: 10;
        }

        .login-btn:hover {
            background-color: #00e5ff;
            color: #131722;
        }

        .rave-content {
            padding: 30px 25px 20px 25px;
            text-align: center;
            position: relative;
        }

        .avatar-container {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid #131722;
            overflow: hidden;
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rave-logo-text {
            color: #00e5ff; 
            font-size: 1.6rem;
            font-weight: 900;
            margin-top: 35px;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .kings-title {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .kings-title span {
            color: #00e5ff;
            background: linear-gradient(45deg, #00e5ff, #bd00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 15px 0;
        }

        .btn-action {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .btn-join {
            background: linear-gradient(90deg, #00e5ff, #00b0ff);
            color: #0b0d19;
            box-shadow: 0 4px 10px rgba(0, 229, 255, 0.2);
        }

        .btn-join:hover {
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
        }

        .btn-transfer {
            background-color: #1c2135;
            color: #ffffff;
            border: 1px solid #2d3748;
        }

        .btn-transfer:hover {
            background-color: #252b46;
        }

        .login-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background-color: #131722;
            border: 1px solid #1f2638;
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .modal-content h3 { margin-bottom: 15px; color: #00e5ff; }
        .modal-content input {
            width: 100%; padding: 10px; margin-bottom: 15px;
            background-color: #0b0d19; border: 1px solid #2d3748;
            border-radius: 8px; color: white; text-align: center;
        }

        .modal-content button {
            background-color: #00e5ff; color: #131722;
            padding: 10px 20px; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; width: 100%;
        }

        .rave-footer {
            background-color: #0b0d19;
            padding: 15px;
            text-align: center;
            border-top: 1px solid #1f2638;
            font-size: 0.8rem;
            color: #4a5568;
        }
    </style>
</head>
<body>

    <div class="rave-container">
        <div class="rave-player">
            <span class="live-badge">RAVE ROOM</span>
            <button class="login-btn" id="loginBtn" onclick="openModal()">تسجيل الدخول</button>
            <img src="IMG_20260102_234410_803.jpg" alt="Rave Main Media">
        </div>

        <div class="rave-content">
            <div class="avatar-container">
                <img src="IMG_20260511_145105_983.jpg" alt="Rave Avatar">
            </div>

            <div class="rave-logo-text" id="welcomeText">RAVE ROOM</div>
            <h1 class="kings-title"> solo still here  <br><span>سولو & gl6c</span></h1>
            
            <div class="action-buttons">
                <!-- تم إصلاح الرابط هنا ليعمل بطريقة برمجية مباشرة ومستقلة وضمان الانتقال للغرفة فوراً -->
                <button class="btn-action btn-join" onclick="goToRoom()">
                    🚀 دخول الغرفة السريعة
                </button>
                <button class="btn-action btn-transfer" onclick="goToRoom()">
                    🔄 نقل الغرفة الحالية إلى التطبيق
                </button>
            </div>
        </div>

        <div class="rave-footer">
            تطوير الواجهة لـ سولو و gl6c © 2026
        </div>
    </div>

    <div class="login-modal" id="loginModal">
        <div class="modal-content">
            <h3>تسجيل الدخول إلى Rave</h3>
            <p style="font-size: 0.85rem; color: #a0aec0; margin-bottom: 15px;">ادخل حسابك للاتصال بغرفة الملوك</p>
            <input type="text" id="usernameInput" placeholder="اسم المستخدم في Rave">
            <input type="password" placeholder="كلمة المرور">
            <button onclick="submitLogin()">ربط الحساب الآن</button>
        </div>
    </div>

    <script>
        function openModal() {
            document.getElementById('loginModal').style.display = 'flex';
        }

        function submitLogin() {
            var name = document.getElementById('usernameInput').value;
            if(name.trim() !== "") {
                document.getElementById('welcomeText').innerHTML = "أهلاً بك، " + name;
                document.getElementById('loginBtn').innerHTML = "متصل ✅";
            }
            document.getElementById('loginModal').style.display = 'none';
        }

        // دالة موحدة ومباشرة تفتح غرفتك الحقيقية بنسبة 100% دون الاعتماد على مسارات خارجية
        function goToRoom() {
            window.open('https://rave.link/VgHzDuj', '_blank');
        }

        window.onclick = function(event) {
            var modal = document.getElementById('loginModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>

</body>
</html>
