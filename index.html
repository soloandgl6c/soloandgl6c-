<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>solo still here</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0b0f;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            font-size: 2rem;
            color: #ff3366;
            text-shadow: 0 0 10px rgba(255, 51, 102, 0.5);
            margin-bottom: 20px;
        }
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ff3366;
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.3);
            margin-bottom: 20px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #16161f;
            color: #fff;
            box-sizing: border-box;
            font-size: 1rem;
        }
        input:focus, textarea:focus {
            border-color: #ff3366;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #ff3366, #ff0055);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 51, 102, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 51, 102, 0.6);
        }
        .status {
            margin-top: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Logo" class="logo">
        
        <h1>solo still here</h1>
        
        <input type="text" id="username" placeholder="اسمك أو اليوزر">
        <textarea id="message" rows="4" placeholder="اكتب رسالتك هنا..."></textarea>
        
        <button onclick="sendMessageToTelegram()">إرسال الرسالة</button>
        
        <div class="status" id="statusMessage"></div>
    </div>

    <script>
        function sendMessageToTelegram() {
            // التوكن والآيدي الصحيحين الخاصين بك
            const telegramToken = '8682236536:AAGoE9FK7001zcRI1Ul-zAaxHRdtEtZGeEc';
            const chatId = '5993890862'; 

            const username = document.getElementById('username').value;
            const message = document.getElementById('message').value;
            const statusMessage = document.getElementById('statusMessage');

            if (!message) {
                statusMessage.style.color = '#ff3333';
                statusMessage.innerText = 'الرجاء كتابة رسالة أولاً!';
                return;
            }

            statusMessage.style.color = '#b5b5b5';
            statusMessage.innerText = 'جاري الإرسال...';

            const fullText = `📩 رسالة جديدة من الموقع:\n\n👤 المرسل: ${username || 'مجهول'}\n💬 الرسالة: ${message}`;
            const url = `https://api.telegram.org/bot${telegramToken}/sendMessage`;

            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: fullText
                })
            })
            .then(response => {
                if (response.ok) {
                    statusMessage.style.color = '#00ffcc';
                    statusMessage.innerText = '✅ تم إرسال رسالتك بنجاح!';
                    document.getElementById('username').value = '';
                    document.getElementById('message').value = '';
                } else {
                    statusMessage.style.color = '#ff3333';
                    statusMessage.innerText = '❌ فشل الإرسال. تأكد من تفعيل البوت بالضغط على Start بالداخل.';
                }
            })
            .catch(error => {
                statusMessage.style.color = '#ff3333';
                statusMessage.innerText = '❌ حدث خطأ في الاتصال.';
                console.error('Error:', error);
            });
        }
    </script>

</body>
</html>
