<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rave - Solo & GL6C</title>
    <!-- استدعاء خط Cairo الأنيق -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* تصميم مستوحى من تطبيق Rave بتنسيق متناسق للصورة المرفوعة */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #0b0d19; 
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* حاوية واجهة التطبيق لتشبه مشغل الميديا */
        .rave-container {
            width: 100%;
            max-width: 450px;
            background-color: #131722;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 25px rgba(0, 229, 255, 0.15);
            border: 1px solid #1f2638;
            position: relative;
        }

        /* شريط الميديا العلوي */
        .rave-player {
            width: 100%;
            position: relative;
            background-color: #000000;
            aspect-ratio: 16 / 11;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rave-player img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* شارة البث المباشر في برنامج Rave */
        .live-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #ff0055;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
            animation: pulse 1.5s infinite;
            z-index: 10;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* محتوى الغرفة والعبارات */
        .rave-content {
            padding: 30px 25px 25px 25px;
            text-align: center;
            position: relative;
        }

        /* تنسيق الصورة الثانية كصورة رمزية دائرية متداخلة بين المشغل والمحتوى */
        .avatar-container {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 4px solid #131722;
            overflow: hidden;
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
            background-color: #131722;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* الأيقونة الرمزية للتطبيق */
        .rave-logo-text {
            color: #00e5ff; 
            font-size: 1.8rem;
            font-weight: 900;
            margin-top: 35px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }

        /* العبارة الخاصة بكم */
        .kings-title {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.4;
            color: #ffffff;
            margin-bottom: 15px;
        }

        .kings-title span {
            color: #00e5ff;
            background: linear-gradient(45deg, #00e5ff, #bd00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        /* تفاصيل الغرفة */
        .room-details {
            background-color: #1c2135;
            padding: 12px 20px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            font-size: 0.9rem;
            color: #a0aec0;
        }

        .room-status-dot {
            width: 8px;
            height: 8px;
            background-color: #00ff66;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff66;
        }

        /* الشريط السفلي */
        .rave-footer {
            background-color: #0b0d19;
            padding: 15px;
            text-align: center;
            border-top: 1px solid #1f2638;
            font-size: 0.8rem;
            color: #4a5568;
        }
    </style>
</head>
<body>

    <div class="rave-container">
        <!-- مشغل الميديا الرئيسي ويحتوي على صورتك الأولى المرفوعة -->
        <div class="rave-player">
            <span class="live-badge">RAVE ROOM</span>
            <img src="IMG_20260102_234410_803.jpg" alt="Rave Main Media">
        </div>

        <!-- تفاصيل واجهة الغرفة والمحتوى -->
        <div class="rave-content">
            <!-- الحاوية الدائرية وبداخلها صورتك الثانية المرفوعة -->
            <div class="avatar-container">
                <img src="IMG_20260511_145105_983.jpg" alt="Rave Avatar">
            </div>

            <div class="rave-logo-text">RAVE</div>
            <h1 class="kings-title">نحن ملوك البرنامج <br><span>سولو & gl6c</span></h1>
            
            <div class="room-details">
                <span class="room-status-dot"></span>
                <span>الغرفة الرسمية نشطة الآن</span>
            </div>
        </div>

        <!-- أسفل الصفحة -->
        <div class="rave-footer">
            تطوير الواجهة لـ سولو و gl6c © 2026
        </div>
    </div>

</body>
</html>
