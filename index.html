<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo - Guts Room</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

</head>
<body>

    <div class="guts-bg-overlay"></div>

    <div class="main-container">

        <!-- تعديل الزر ليعمل بالتحويل الإجباري السريع -->

            <button id="raveBtn" class="rave-link-btn pulse-animation">

            </button>

    <!-- ربط ملف الجافا سكريبت المسؤول عن التحويل القوي -->
    <script src="script.js"></script>
