<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo & GL6C - Rave Room</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: #0b0d19; color: #ffffff; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: #131722; border-radius: 25px; overflow: hidden; border: 1px solid #1f2638; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* مشغل الميديا */
        .player { position: relative; width: 100%; aspect-ratio: 16/10; background: #000; }
        .player img { width: 100%; height: 100%; object-fit: cover; }
        
        /* الهارب */
        .traitor { position: absolute; top: 10px; left: 10px; z-index: 10; text-align: center; }
        .traitor img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #ff0055; }
        .traitor p { font-size: 0.6rem; color: #ff0055; font-weight: bold; }
        
        /* الصورة الملكية والاسم */
        .profile-section { position: relative; margin-top: -50px; text-align: center; padding-bottom: 10px; display: flex; flex-direction: column; align-items: center; }
        .crown { font-size: 2rem; margin-bottom: -10px; animation: float 2s infinite alternate; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #131722; box-shadow: 0 0 15px #00e5ff; }
        
        /* اسم آدم وعلامة غاتس */
        .profile-name-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }
        .profile-name {
            font-size: 1.4rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        .guts-brand {
            width: 24px;
            height: 24px;
            fill: #ff003c;
            filter: drop-shadow(0 0 5px #ff003c);
            animation: pulse-brand 1.5s infinite alternate;
        }

        @keyframes float { from { transform: translateY(0); } to { transform: translateY(-5px); } }
        @keyframes pulse-brand { from { opacity: 0.7; filter: drop-shadow(0 0 3px #ff003c); } to { opacity: 1; filter: drop-shadow(0 0 8px #ff003c); } }
        
        /* الأزرار والعناوين */
        .content { padding: 10px 20px 20px 20px; text-align: center; }
        .title { font-size: 1.3rem; font-weight: 900; color: #00e5ff; margin-bottom: 20px; line-height: 1.4; }
        .btn { display: block; width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; font-weight: bold; text-decoration: none; text-align: center; color: #000; background: #00e5ff; transition: 0.3s; }
        .btn:hover { background: #00b0ff; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="container">
    <div class="player">
        <!-- قسم الهارب -->
        <div class="traitor">
            <img src="IMG_20260522_205812_850.jpg" alt="Traitor">
            <p>الهارب لا نعترف به</p>
        </div>
        <img src="IMG_20260102_234410_803.jpg" alt="Background">
    </div>

    <!-- قسم الملف الشخصي المحدث -->
    <div class="profile-section">
        <div class="crown">👑</div>
        <img src="IMG_20260530_044019_296.jpg" class="profile-img" alt="Profile">
        
        <!-- اسم آدم مع علامة التضحية لـ غاتس -->
        <div class="profile-name-wrapper">
            <span class="profile-name">Adam</span>
            <svg class="guts-brand" viewBox="0 0 24 32">
                <!-- رسم دقيق لعلامة Berserk (Brand of Sacrifice) -->
                <path d="M12,0 L14,5 L14,13 L22,7 L23,9 L14,16 L18,25 L16,26 L12,18 L8,26 L6,25 L10,16 L1,9 L2,7 L10,13 L10,5 Z M11,15 L11,32 L13,32 L13,15 Z"/>
            </svg>
        </div>
    </div>

    <div class="content">
        <h1 class="title">solo still here <br> & gl6c</h1>
        <a href="intent://rave.link/VgHzDuj#Intent;scheme=https;package=com.rave.app;end" class="btn">🚀 دخول الغرفة السريعة</a>
        <a href="intent://rave.link/VgHzDuj#Intent;scheme=https;package=com.rave.app;end" class="btn" style="background:#1c2135; color:#fff;">🔄 فتح في تطبيق Rave</a>
    </div>
</div>

</body>
</html>
